services:
  - type: web
    name: alt-ai-labs-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alt-ai-labs-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://alt-ai-labs.vercel.app
      - key: NODE_ENV
        value: production

databases:
  - name: alt-ai-labs-db
    plan: free
    databaseName: altailabs
    postgresMajorVersion: "16"
    ipAllowList: []
